<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OZAMA CHESS</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script src="multiplayer.js"></script>

</body>
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="topbar">

      <h1 class="logo">
        OZAMA CHESS ♟
      </h1>

      <!-- FIX: turn-player → turn-indicator -->
      <div class="turn-container">

        <div id="white-turn" class="turn-indicator active">
          ⚪ White
        </div>

        <div id="black-turn" class="turn-indicator">
          ⚫ Black
        </div>

      </div>

    </header>

    <!-- STATUS -->
    <div id="status-message" class="status-message">
      White's turn
    </div>

    <!-- BOARD -->
    <div id="board" class="board"></div>

    <!-- CONTROLS -->
    <!-- FIX: added control-btn class to both buttons, danger to resign -->
    <div class="controls">

      <button id="new-game-btn" class="control-btn">
        🔄 New Game
      </button>

      <button id="resign-btn" class="control-btn danger">
        🏳️ Resign
      </button>

    </div>

  </div>

  <!-- GAME OVER OVERLAY -->
  <div id="game-over-overlay" class="overlay hidden">

    <div class="overlay-card">

      <h2 id="game-over-title">CHECKMATE</h2>

      <p id="game-over-subtitle">White wins!</p>

      <button id="play-again-btn" class="control-btn">
        ▶ Play Again
      </button>

    </div>

  </div>

  <!-- PROMOTION DIALOG -->
  <div id="promotion-dialog" class="promotion-dialog hidden">

    <div class="promotion-card">

      <!-- FIX: h3 → h2 to match CSS -->
      <h2>Choose Promotion</h2>

      <div class="promotion-options"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
